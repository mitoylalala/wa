<!DOCTYPE html>
<html>
<head>
  <title>Document Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d47a1;
      margin: 0;
      padding: 0;
      text-align: center;
      color: white;
    }

    .container {
      margin-top: 50px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      background: #2196f3;
      color: white;
      cursor: pointer;
      margin-left: 5px;
    }

    button:hover {
      background: #1976d2;
    }

    .card {
      margin-top: 30px;
      background: white;
      color: black;
      display: inline-block;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>📄 Document Viewer</h2>

    <input type="text" id="searchID" placeholder="Enter Document ID">
    <button onclick="searchDocument()">Search</button>

    <div id="result"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDlYlQwE5Cv7ve7hvoQ9rpWf_xhd0FDCDs",
      authDomain: "trackingsystem-dea7b.firebaseapp.com",
      databaseURL: "https://trackingsystem-dea7b-default-rtdb.firebaseio.com",
      projectId: "trackingsystem-dea7b",
      storageBucket: "trackingsystem-dea7b.firebasestorage.app",
      messagingSenderId: "1007626152785",
      appId: "1:1007626152785:web:a567ca49ef74d1bfa00170"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.searchDocument = function () {

      const id = document.getElementById("searchID").value;
      const resultDiv = document.getElementById("result");

      if (!id) {
        alert("Enter Document ID");
        return;
      }

      const docRef = ref(db, "documents/" + id);

      onValue(docRef, (snapshot) => {

        if (snapshot.exists()) {
          const data = snapshot.val();

          resultDiv.innerHTML = `
            <div class="card">
              <h3>Document ID: ${id}</h3>
              <p><b>Title:</b> ${data.title || ""}</p>
              <p><b>Status:</b> ${data.status || ""}</p>
              <p><b>Handler:</b> ${data.handler || ""}</p>
              <img src="${data.image || ""}" />
            </div>
          `;
        } else {
          resultDiv.innerHTML = "<p>Document not found.</p>";
        }

      });

    }
  </script>

</body>
</html>
