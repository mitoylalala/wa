<!DOCTYPE html>
<html>
<head>
  <title>Document Image</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0d47a1;
      height: 100%;
      overflow: hidden; /* NO SCROLL */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <img id="docImage" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDlYlQwE5Cv7ve7hvoQ9rpWf_xhd0FDCDs",
      authDomain: "trackingsystem-dea7b.firebaseapp.com",
      databaseURL: "https://trackingsystem-dea7b-default-rtdb.firebaseio.com",
      projectId: "trackingsystem-dea7b",
      storageBucket: "trackingsystem-dea7b.firebasestorage.app",
      messagingSenderId: "1007626152785",
      appId: "1:1007626152785:web:a567ca49ef74d1bfa00170"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // GET ID FROM URL
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (id) {
      const imageRef = ref(db, "documents/" + id + "/image");

      onValue(imageRef, (snapshot) => {
        if (snapshot.exists()) {
          document.getElementById("docImage").src = snapshot.val();
        } else {
          document.body.innerHTML = "<h2 style='color:white'>No Image Found</h2>";
        }
      });
    } else {
      document.body.innerHTML = "<h2 style='color:white'>No Document ID</h2>";
    }

  </script>

</body>
</html>
